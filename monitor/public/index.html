<!-- Mermaid 11 вҖ” native flowchart rendering, dagre layout лӮҙмһҘ. мҳөмӢңл””м–ё system-diagrams.md мқҳ mermaid лё”лЎқмқ„ л°ұм—”л“ң(/api/architecture/diagrams.mermaid_source)к°Җ к·ёлҢҖлЎң м „лӢ¬, н”„лЎ нҠёлҠ” mermaid.render() лЎң SVG ліҖнҷҳ. -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<!-- svg-pan-zoom 3.6.2 вҖ” Mermaid к°Җ мғқм„ұн•ң SVG м—җ нң  zoom + л“ңлһҳк·ё pan + лҚ”лё”нҒҙлҰӯ zoom-in + м»ЁнҠёлЎӨ м•„мқҙмҪҳ л¶Җм—¬. window.svgPanZoom мңјлЎң л…ём¶ң. -->
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>
<script>
  // dark theme + нҸ°нҠё + м „мІҙ л„Ҳл№„ fit. startOnLoad:false вҶ’ architecture.jsx к°Җ нғӯ ліҖкІҪ мӢң мҲҳлҸҷ render.
  // securityLevel:'loose' вҖ” mermaid_source лҠ” л°ұм—”л“ңк°Җ мҳөмӢңл””м–ё vault м—җм„ң м§Ғм ‘ мқҪмқҖ internal source (мҷёл¶Җ мӮ¬мҡ©мһҗ мһ…л Ҙ м•„лӢҳ).
  window.mermaid?.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      // лӢӨнҒ¬ к°ҖлҸ…м„ұ вҖ” theme:'dark' мқҳ type-specific н…ҚмҠӨнҠё кё°ліёк°’мқҙ "calculated"/"black" мңјлЎң лӮЁм•„
      //   #0a0a0a мң„ dark-on-dark л¶Ҳк°ҖмӢң л°ңмғқ (mindmap мӨ‘мӢ¬л…ёл“ңВ·л¬ҙмғүл…ёл“ң, pie/journey/timeline лқјлІЁ).
      //   вҶ’ м§„лӢЁ(2026-06-01): primaryTextColor лҠ” flowchart node л§Ң м»ӨлІ„, нғҖмһ…лі„ ліҖмҲҳлҠ” лҜём„Өм • fallback.
      //   ліҖмҲҳлӘ… м „л¶Җ mermaid@11 лІҲл“Ө grep мңјлЎң мӢӨмёЎ кІҖмҰқ (context7 лҜёк°Җмҡ© вҶ’ CDN лІҲл“Ө м§Ғм ‘ лҢҖмЎ°).
      darkMode: true,
      background: '#0a0a0a',
      primaryColor: '#1e3a8a',
      primaryTextColor: '#e5e7eb',
      lineColor: '#94a3b8',
      fontSize: '14px',
      fontFamily: 'Pretendard, system-ui, -apple-system, sans-serif',

      // м „м—ӯ н…ҚмҠӨнҠё вҖ” labelTextColorвҶ’actorTextColor / textColorвҶ’primaryTextColor мІҙмқёмқҳ dark кё°ліёк°’мқҙ
      //   "black"/"calculated" вҶ’ лӘ…мӢң light кі м •. taskTextColorВ·actorTextColor лҸ„ мқҙ мІҙмқё мқҳмЎҙ.
      textColor: '#e5e7eb',
      nodeTextColor: '#e5e7eb',
      labelTextColor: '#e5e7eb',
      titleColor: '#f1f5f9',
      noteTextColor: '#0a0a0a',     // noteBkg к°Җ л°қмқҖ нҷ©мғү вҶ’ л…ёнҠё н…ҚмҠӨнҠёлҠ” м–ҙл‘ЎкІҢ(лҢҖл№„ нҷ•ліҙ)
      noteBkgColor: '#fde68a',

      // л…ёл“ң/м„№м…ҳ fill вҖ” light н…ҚмҠӨнҠёк°Җ м–№нһҲлҸ„лЎқ м–ҙл‘җмҡҙ л©ҙмғү н‘ңмӨҖнҷ” (мһҗлҸҷ cScale л°қмқҖ fill нҡҢн”ј).
      mainBkg: '#1e293b',
      secondaryColor: '#334155',
      tertiaryColor: '#475569',
      secondaryTextColor: '#e5e7eb',
      tertiaryTextColor: '#e5e7eb',

      // pie вҖ” title/section/legend н…ҚмҠӨнҠёлҠ” raw кё°ліёк°’ лҜён• лӢ№(вҶ’ мў…мў… кІҖм •) вҶ’ м „л¶Җ light, stroke лҠ” line нҶӨ.
      pieTitleTextColor: '#f1f5f9',
      pieSectionTextColor: '#e5e7eb',
      pieLegendTextColor: '#e5e7eb',
      pieStrokeColor: '#0a0a0a',
      pieOuterStrokeColor: '#94a3b8',

      // journey вҖ” actor/task/label н…ҚмҠӨнҠё + label л°•мҠӨ л°°кІҪ (dark кё°ліё actorTextColor="black" ліҙм •).
      actorTextColor: '#e5e7eb',
      taskTextColor: '#e5e7eb',
      labelBoxBkgColor: '#1e293b',
      // section нғҖмқҙнӢҖ н…ҚмҠӨнҠё(.section-type-N)лҠ” fillType0..7 мӮ¬мҡ© вҶ’ кё°ліёк°’ primaryColor(#1e3a8a) лқј
      //   #0a0a0a мң„ 1.9:1 л¶Ҳк°ҖмӢң(мӢӨмёЎ кІҖм¶ң). 8к°ң м „л¶Җ light лӘ…мӢңлЎң ліҙм •.
      fillType0: '#e5e7eb', fillType1: '#e5e7eb', fillType2: '#e5e7eb', fillType3: '#e5e7eb',
      fillType4: '#e5e7eb', fillType5: '#e5e7eb', fillType6: '#e5e7eb', fillType7: '#e5e7eb',

      // stateDiagram-v2 вҖ” мғҒнғң лқјлІЁ + ліөн•© мғҒнғң нғҖмқҙнӢҖ л°°кІҪ.
      labelColor: '#e5e7eb',
      stateLabelColor: '#e5e7eb',
      compositeTitleBackground: '#1e293b',

      // mindmap вҖ” лқјлІЁмғүмқҖ cScaleLabel0..11 мӮ¬мҡ©(cScaleLabel = Ge(labelTextColor) invert мІҙмқё) вҶ’
      //   л¬ҙмғүл…ёл“ң/мӨ‘мӢ¬л…ёл“ң dark-on-dark мқҳ м§Ғм ‘ мӣҗмқё. 12к°ң м „л¶Җ light лӘ…мӢңлЎң fallback invert м°ЁлӢЁ.
      cScaleLabel0: '#e5e7eb', cScaleLabel1: '#e5e7eb', cScaleLabel2: '#e5e7eb',
      cScaleLabel3: '#e5e7eb', cScaleLabel4: '#e5e7eb', cScaleLabel5: '#e5e7eb',
      cScaleLabel6: '#e5e7eb', cScaleLabel7: '#e5e7eb', cScaleLabel8: '#e5e7eb',
      cScaleLabel9: '#e5e7eb', cScaleLabel10: '#e5e7eb', cScaleLabel11: '#e5e7eb',
    },
    flowchart: {
      htmlLabels: true,
      curve: 'basis',
      padding: 12,
      nodeSpacing: 50,
      rankSpacing: 60,
      useMaxWidth: true,
    },
    securityLevel: 'loose',
  });
</script>
