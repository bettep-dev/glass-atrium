# Glass Atrium release publishing — fires on a pushed `v*` tag.
#
# SCAFFOLD (E1/T04). This workflow creates a GitHub Release carrying the two
# update-system assets — manifest.json (version + per-file SHA-256) and the
# hashed file bundle — over the authenticated GitHub host. The update badge +
# skill read the release `manifest.json` over HTTPS; integrity is per-file
# SHA-256 (never raw `main`, no git remote on the consumer).
#
# No repo URL is hardcoded: `${{ github.repository }}` and `${{ github.token }}`
# resolve at runtime. Nothing fires until a user pushes the first `v*` tag —
# this scaffold creates no remote and no tag on its own.
#
#   TODO (PENDING USER STEP): the GitHub repo does not exist yet. Once the user
#   creates the repo + remote and pushes tag `v<manifest.version>`, this runs.

name: release

# Quoted `on` avoids the YAML 1.1 bareword→boolean coercion (matches ci.yml).
"on":
  push:
    tags: ["v*"]

# Least privilege: only the write scope a Release needs. `contents: write` is
# REQUIRED here (unlike ci.yml's deny-all) because `gh release create` creates a
# Release object + uploads assets — a read-only token would 403. This is scoped
# to release.yml alone; ci.yml keeps its own `permissions: {}` deny-all.
#
# SECURITY (audited-safe): no OIDC (`id-token: write`) block — this workflow
# authenticates to GitHub itself via the ambient, keyless `github.token`, which
# needs no OIDC exchange. OIDC would only matter if a step federated into an
# external cloud (none does). Omitting `id-token` keeps the token surface tight.
# The GH_TOKEN is NOT declared at the workflow/job level: it is set STEP-SCOPED
# (see the two `env: GH_TOKEN:` blocks below) so only the two steps that
# actually call `gh` see it — the manifest-verify / tag-assert / build steps run
# with no GH_TOKEN in their environment (least-privilege token exposure).
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish GitHub Release (manifest + hashed bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # CI-green preflight. ci.yml has NO tag trigger, so a `v*` tag push never
      # runs CI itself — and `on: workflow_run: [ci]` would never fire for this
      # tag (and would lose the tag ref the version assertion below needs). So we
      # keep the `on: push: tags` trigger and instead PROVE that CI already
      # concluded success for this exact commit (github.sha) — the tagged commit
      # is expected to be one already merged to main, which ci.yml gates. We poll
      # the required `ci-pass (required)` check-run for github.sha and refuse to
      # publish unless it concluded success. gh's built-in --jq needs no jq
      # install (this step runs before the jq install below).
      # STEP-SCOPED GH_TOKEN (audited-safe): the token is exposed only to this
      # step's env, not the workflow/job env — the manifest-verify / tag-assert /
      # build steps below run without it. `github.token` is the keyless ambient
      # token (no OIDC, no PAT); the CI-green check-run READ it performs is
      # covered by the default read grant of that token.
      - name: Require CI green for the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          required_check="ci-pass (required)"
          # Retry: the tag push may arrive before the main-branch CI run for the
          # same SHA has finished; poll a bounded number of times.
          attempts=20
          sleep_seconds=30
          for ((i = 1; i <= attempts; i++)); do
            conclusion="$(
              gh api \
                "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
                --paginate \
                --jq "([.check_runs[] | select(.name == \"${required_check}\")]
                       | sort_by(.started_at) | last | .conclusion) // \"pending\""
            )"
            case "${conclusion}" in
              success)
                echo "ok: ${required_check} concluded success for ${GITHUB_SHA}"
                exit 0
                ;;
              pending | "" | null)
                echo "attempt ${i}/${attempts}: ${required_check} still pending for ${GITHUB_SHA}"
                ;;
              *)
                echo "FATAL: ${required_check} concluded '${conclusion}' (not success) for ${GITHUB_SHA}" >&2
                exit 1
                ;;
            esac
            if [[ "${i}" -lt "${attempts}" ]]; then
              sleep "${sleep_seconds}"
            fi
          done
          echo "FATAL: ${required_check} did not conclude success for ${GITHUB_SHA} within the poll window" >&2
          exit 1

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Refuse a stale manifest: version + per-file hashes + file list must match
      # the tracked tree (generate-manifest.sh --check, exit 1 on any drift).
      - name: Verify manifest integrity (--check)
        run: ./scripts/generate-manifest.sh --check

      # The pushed tag MUST equal v<manifest.version> so the release version of
      # record cannot drift from the asset it ships.
      - name: Assert tag matches manifest version
        run: |
          manifest_version="$(jq -r '.version' manifest.json)"
          expected="v${manifest_version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
            echo "tag ${GITHUB_REF_NAME} != manifest version tag ${expected}" >&2
            exit 1
          fi
          echo "ok: ${GITHUB_REF_NAME} == ${expected}"

      # Stage manifest.json + the hashed bundle into a runner temp dir.
      - name: Build release assets
        run: ./scripts/publish-release.sh build --out "${RUNNER_TEMP}/release"

      # Upload both assets to a Release for the pushed tag. gh resolves
      # owner/repo from the github context — no URL hardcoded.
      - name: Create GitHub Release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          manifest_version="$(jq -r '.version' manifest.json)"
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Glass Atrium ${manifest_version}" \
            --notes "Glass Atrium release ${manifest_version} (manifest + hashed bundle)." \
            "${RUNNER_TEMP}/release/manifest.json" \
            "${RUNNER_TEMP}/release/glass-atrium-bundle-${manifest_version}.tar.gz"
